name: Security Scanning
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  govulncheck:
    name: "Dependency vulnerability scan (govulncheck)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Run govulncheck
        run: govulncheck ./...

  gosec-g101:
    name: "Hardcoded credentials scan (gosec G101)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
      - name: Run gosec G101
        run: gosec -include=G101 ./...
