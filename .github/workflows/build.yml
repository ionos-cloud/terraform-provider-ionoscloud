name: Sonarcloud and gofmt
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # ratchet:SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  go-mod-tidy:
    name: "Check go mod tidy and vendor"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git diff -- go.mod go.sum)" ]; then
            echo "::error::go.mod or go.sum are not tidy. Please run 'go mod tidy' and commit the changes."
            echo "git diff -- go.mod go.sum:"
            git diff -- go.mod go.sum
            exit 1
          fi
      - name: Check go mod vendor
        run: |
          go mod vendor
          if [ -n "$(git status --porcelain vendor/)" ]; then
            echo "::error::vendor/ is out of date. Please run 'go mod vendor' and commit the changes."
            echo "git status --porcelain vendor/:"
            git status --porcelain vendor/
            git diff --stat vendor/
            exit 1
          fi
  gofmt:
    name: "Run gofmt check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Unshallow
        run: git fetch --prune --unshallow
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Check code is formatted properly
        uses: Jerome1337/gofmt-action@d5eabd189843f1d568286a54578159978b7c0fb1 # ratchet:Jerome1337/gofmt-action@v1.0.5
        with:
          gofmt-path: '.'
          gofmt-flags: '-l -d'
  vet:
    name: "Run go vet with all build tags"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # ratchet:actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: go vet
        run: go vet -tags=all ./...
